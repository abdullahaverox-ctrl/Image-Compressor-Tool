kind = "web"
previewPath = "/"
title = "Image Tools"
version = "1.0.0"
id = "artifacts/image-tools"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21965

[services.development]
run = "pnpm --filter @workspace/image-tools run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/image-tools", "run", "build" ]
publicDir = "artifacts/image-tools/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21965"
BASE_PATH = "/"
